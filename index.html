<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex">
    <title>PVC POKER ROOM</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        /* 管理者専用要素の表示制御 */
        .admin-ui { display: none !important; }
        .is-admin .admin-ui { display: block !important; }
        .is-admin .admin-flex { display: flex !important; }
        .buy-in-tag { display: inline-flex; align-items: center; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; padding: 2px 6px; margin: 2px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col transition-all">
        
        <!-- 1. 入室画面 -->
        <div id="roomSelector" class="flex-grow flex flex-col justify-center p-6 text-center">
            <a href="ranking.html" style="display: inline-block;">
                <img src="logo.png" alt="ロゴ" style="max-width: 100%; height: auto; display: block;">
            </a>
            <p class="text-slate-400 font-bold text-[10px] tracking-[0.2em] mb-10 uppercase text-center">Ver2.1.1</p>
            <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100">
                <input type="text" id="roomIdInput" placeholder="ルーム名を入力" class="w-full border-2 border-slate-100 rounded-xl px-4 py-4 text-center text-xl font-bold focus:border-indigo-500 outline-none mb-4">
                <div class="flex gap-2">
                    <button onclick="joinRoom()" class="w-1/2 bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition">入室</button>
                    <button onclick="createRoom()" class="w-1/2 bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition">作成</button>
                </div>
            </div>
        </div>

        <!-- 2. メイン画面 -->
        <div id="mainApp" style="display:none;" class="flex flex-col flex-grow">
            <!-- ヘッダー -->
            <div class="bg-indigo-700 p-4 text-white sticky top-0 z-10 shadow-md">
                <div class="flex justify-between items-center mb-3">
                    <h2 id="displayRoomId" class="text-lg font-black truncate max-w-[150px]"></h2>
                    <div id="loginSection" class="flex gap-2 items-center">
                        <input type="password" id="adminCodeInput" placeholder="Code" class="rounded px-2 py-1 w-16 text-sm text-black outline-none font-bold">
                        <button onclick="toggleAdmin()" id="adminBtn" class="bg-indigo-500 px-3 py-1 rounded text-xs font-black uppercase shadow-sm">解除</button>
                    </div>
                </div>
                <!-- 整合性チェック -->
                <div class="grid grid-cols-3 gap-1 text-[10px] text-center bg-indigo-800 rounded-lg p-2">
                    <div><div class="opacity-60">BUY-IN</div><div id="totalBuyInPoints" class="font-mono font-bold text-yellow-300">0</div></div>
                    <div><div class="opacity-60">FINAL</div><div id="totalFinalPoints" class="font-mono font-bold text-cyan-300">0</div></div>
                    <div><div class="opacity-60">DIFF</div><div id="diffPoints" class="font-mono font-bold">0</div></div>
                </div>
            </div>

            <div class="p-4 pb-32">
                <!-- 管理者設定パネル（解除中のみ表示） -->
                <div class="admin-ui mb-6 space-y-4 p-4 bg-amber-50 rounded-xl border border-amber-200 shadow-inner">
                    <h3 class="text-[10px] font-black text-amber-800 uppercase tracking-widest border-b border-amber-200 pb-1 mb-2">管理者用設定 (編集可能)</h3>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[9px] font-black text-amber-600 uppercase">10点 = VNDレート</label>
                            <input type="number" id="rate" value="10000" class="w-full border rounded-lg px-2 py-1.5 font-bold text-sm mt-1" onchange="pushUpdate()">
                        </div>
                        <div>
                            <label class="block text-[9px] font-black text-amber-600 uppercase">管理コード変更</label>
                            <div class="flex gap-1 mt-1 font-bold">
                                <input type="text" id="newAdminCodeInput" placeholder="新コード" class="w-full border rounded-lg px-2 py-1.5 text-xs">
                                <button onclick="updateAdminCode()" class="bg-slate-700 text-white px-2 py-1 rounded-lg text-[9px]">保存</button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[9px] font-black text-amber-600 uppercase font-bold">プレイヤー追加</label>
                        <div class="flex gap-2 mt-1">
                            <input type="text" id="newPlayerName" class="flex-grow border rounded-lg px-3 py-2 font-bold text-sm outline-none focus:border-amber-500">
                            <button onclick="addPlayer()" class="bg-amber-600 text-white px-5 py-2 rounded-lg font-bold text-sm shadow-md">追加</button>
                        </div>
                    </div>
                </div>

                <!-- プレイヤーカードリスト -->
                <div id="playerList" class="space-y-4">
                    <!-- JSでカードを挿入 -->
                </div>
            </div>

            <!-- フッター -->
            <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent">
                <div class="max-w-md mx-auto flex justify-between items-center px-2">
                    <span id="statusBadge" class="text-[10px] font-black text-slate-400 bg-slate-200 px-3 py-1 rounded-full uppercase tracking-widest">Locked / Read Only</span>
                    <button onclick="resetAll()" class="admin-ui text-red-500 text-[10px] font-black uppercase underline">全データリセット</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase設定（ご自身の情報を入れてください） ---
        const firebaseConfig = {
            projectId: "mito-natto-168bd",
            apiKey: "ここにAPIキーを入れてください", 
            authDomain: "mito-natto-168bd.firebaseapp.com",
            databaseURL: "https://mito-natto-168bd-default-rtdb.firebaseio.com",
            storageBucket: "mito-natto-168bd.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentRoomId = "";
        let players = [];
        let adminCode = "0000";
        let isAdmin = false;

        // 入室ボタン
        async function joinRoom() {
            const id = document.getElementById('roomIdInput').value.trim();
            if (!id) return alert("ルーム名を入力してください");

            const doc = await db.collection("pokerRooms").doc(id).get();
            if (!doc.exists) {
                alert("エラー：ルームが存在しません。");
                return;
            }
            startRoomSession(id);
        }

        // 作成ボタン
        async function createRoom() {
            const id = document.getElementById('roomIdInput').value.trim();
            if (!id) return alert("ルーム名を入力してください");

            const doc = await db.collection("pokerRooms").doc(id).get();
            if (doc.exists) {
                alert("エラー：既に同じ名前のルームが存在します。");
                return;
            }

            // 新規作成
            await db.collection("pokerRooms").doc(id).set({
                players: [],
                adminCode: "0000",
                rate: 10000
            });
            startRoomSession(id);
        }

        // ルーム開始共通処理
        function startRoomSession(id) {
            currentRoomId = id;
            db.collection("pokerRooms").doc(currentRoomId).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    players = data.players || [];
                    adminCode = data.adminCode || "0000";
                    document.getElementById('rate').value = data.rate || 10000;
                    render();
                }
            });
            document.getElementById('roomSelector').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('displayRoomId').innerText = currentRoomId;
        }

        async function pushUpdate() {
            if (!currentRoomId || (!isAdmin && players.length > 0)) return;
            const rate = document.getElementById('rate').value;
            await db.collection("pokerRooms").doc(currentRoomId).set({
                players: players,
                adminCode: adminCode,
                rate: parseInt(rate)
            }, { merge: true });
        }

        // 管理者モードの切替
        function toggleAdmin() {
            const input = document.getElementById('adminCodeInput');
            const btn = document.getElementById('adminBtn');
            const app = document.getElementById('app');
            const badge = document.getElementById('statusBadge');
            
            if (!isAdmin) {
                if (input.value === adminCode) {
                    isAdmin = true;
                    btn.innerText = "LOCK";
                    btn.classList.replace('bg-indigo-500', 'bg-red-600');
                    input.style.display = 'none';
                    app.classList.add('is-admin');
                    badge.innerText = "ADMIN MODE (Editing)";
                    badge.className = "text-[10px] font-black text-white bg-amber-500 px-3 py-1 rounded-full uppercase tracking-widest shadow-md";
                } else {
                    alert("コードが正しくありません");
                    input.value = "";
                }
            } else {
                isAdmin = false;
                btn.innerText = "解除";
                btn.classList.replace('bg-red-600', 'bg-indigo-500');
                input.style.display = 'inline-block';
                input.value = "";
                app.classList.remove('is-admin');
                badge.innerText = "Locked / Read Only";
                badge.className = "text-[10px] font-black text-slate-400 bg-slate-200 px-3 py-1 rounded-full uppercase tracking-widest";
            }
            render();
        }

        function addPlayer() {
            if (!isAdmin) return;
            const nameInput = document.getElementById('newPlayerName');
            const name = nameInput.value.trim();
            if (!name || players.length >= 9) return;
            players.push({ id: Date.now(), name: name, buyIns: [], finalChips: 0 });
            nameInput.value = "";
            pushUpdate();
        }

        function addBuyIn(playerId) {
            if (!isAdmin) return;
            const input = document.getElementById(`buyIn-${playerId}`);
            const val = parseInt(input.value);
            if (!val) return;
            const p = players.find(x => x.id === playerId);
            if (!p.buyIns) p.buyIns = [];
            p.buyIns.push(val);
            input.value = "";
            pushUpdate();
        }

        function removeBuyIn(playerId, idx) {
            if (!isAdmin) return;
            players.find(x => x.id === playerId).buyIns.splice(idx, 1);
            pushUpdate();
        }

        function updateFinal(playerId, val) {
            if (!isAdmin) return;
            players.find(x => x.id === playerId).finalChips = parseInt(val) || 0;
            pushUpdate();
        }

        function removePlayer(playerId) {
            if (!isAdmin) return;
            if (confirm("プレイヤーを削除しますか？")) {
                players = players.filter(x => x.id !== playerId);
                pushUpdate();
            }
        }

        function updateAdminCode() {
            if (!isAdmin) return;
            const newCode = document.getElementById('newAdminCodeInput').value.trim();
            if (newCode) {
                adminCode = newCode;
                pushUpdate();
                alert("管理コードを更新しました。");
                document.getElementById('newAdminCodeInput').value = "";
            }
        }

        function resetAll() {
            if (!isAdmin) return;
            if (confirm("データを全リセットします。本当によろしいですか？")) {
                players = [];
                pushUpdate();
            }
        }

        function render() {
            const list = document.getElementById('playerList');
            const rate = parseFloat(document.getElementById('rate').value) || 0;
            list.innerHTML = "";
            let tB = 0, tF = 0;

            players.forEach(p => {
                const buyInTotal = (p.buyIns || []).reduce((a, b) => a + b, 0);
                const profit = ((p.finalChips - buyInTotal) / 10) * rate;
                tB += buyInTotal; tF += p.finalChips;

                const tags = (p.buyIns || []).map((v, i) => 
                    `<span class="buy-in-tag">${v}${isAdmin ? `<span class="ml-1 text-red-400" onclick="removeBuyIn(${p.id}, ${i})">×</span>` : ''}</span>`
                ).join('');

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 p-4 relative";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-black text-lg text-slate-800">${p.name}</h3>
                        <button onclick="removePlayer(${p.id})" class="admin-ui text-slate-300">✕</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-3">
                        <div>
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Buy-in 履歴</p>
                            <div class="flex flex-wrap min-h-[20px]">${tags}</div>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">合計購入</p>
                            <p class="font-mono font-bold text-slate-600">${buyInTotal.toLocaleString()}</p>
                        </div>
                    </div>

                    <div class="admin-ui mb-4 flex gap-2">
                        <input type="number" id="buyIn-${p.id}" placeholder="点数" class="flex-grow border rounded-lg px-3 py-1 font-bold text-sm bg-slate-50 outline-none focus:border-green-500">
                        <button onclick="addBuyIn(${p.id})" class="bg-green-600 text-white px-4 py-1 rounded-lg font-black text-sm">+</button>
                    </div>

                    <div class="flex justify-between items-end pt-3 border-t border-dashed border-slate-200">
                        <div class="w-1/2">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">最終点数</p>
                            ${isAdmin 
                                ? `<input type="number" value="${p.finalChips}" onchange="updateFinal(${p.id}, this.value)" class="w-24 border-2 border-indigo-100 rounded-md px-2 py-1 font-mono font-black bg-white outline-none focus:border-indigo-500 text-indigo-700">`
                                : `<p class="font-mono font-black text-indigo-700 text-xl">${p.finalChips.toLocaleString()}</p>`
                            }
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">収支 (VND)</p>
                            <p class="font-mono font-black text-lg ${profit >= 0 ? 'text-blue-600' : 'text-red-600'}">
                                ${profit >= 0 ? '+' : ''}${Math.round(profit).toLocaleString()}
                            </p>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });

            document.getElementById('totalBuyInPoints').innerText = tB.toLocaleString();
            document.getElementById('totalFinalPoints').innerText = tF.toLocaleString();
            const diff = tF - tB;
            const dEl = document.getElementById('diffPoints');
            dEl.innerText = diff.toLocaleString();
            dEl.className = diff === 0 ? "font-mono font-bold text-green-400" : "font-mono font-bold text-red-400";
        }
    </script>
</body>
</html>
