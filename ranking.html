<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポーカー収支ランキングV2</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #2c3e50; color: white; font-weight: bold; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f8f9fa; }
        
        .plus { color: #2ecc71; font-weight: bold; } /* 勝ち */
        .minus { color: #e74c3c; font-weight: bold; } /* 負け */
        
        .rank-1 { background-color: #fff9c4; font-weight: bold; } /* 1位の背景を少し豪華に */
        .rank-num { font-size: 1.2em; font-weight: bold; }
        .loading { text-align: center; font-size: 1.2em; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ポーカー収支ランキング</h1>
        <div id="loading" class="loading">データを取得中...</div>
        <table id="rankingTable" style="display:none;">
            <thead>
                <tr>
                    <th>順位</th>
                    <th>名前</th>
                    <th>総購入額</th>
                    <th>最終チップ</th>
                    <th>収支</th>
                </tr>
            </thead>
            <tbody id="rankingBody">
                <!-- JavaScriptで挿入 -->
            </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            projectId: "mito-natto-168bd",
            authDomain: "mito-natto-168bd.firebaseapp.com",
            databaseURL: "https://mito-natto-168bd-default-rtdb.firebaseio.com",
            storageBucket: "mito-natto-168bd.appspot.com",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function fetchRanking() {
            try {
                const dbRef = ref(db, 'pokerRooms');
                const snapshot = await get(dbRef);

                if (snapshot.exists()) {
                    const rooms = snapshot.val();
                    const playerStats = {};

                    // 各ルーム/エントリをループ
                    Object.values(rooms).forEach(room => {
                        // room自体がデータの配列やオブジェクトの場合を考慮
                        // もしpokerRoomsの直下にユーザーデータが並んでいる場合の処理
                        const name = room.name;
                        if (!name) return;

                        // buyInsが配列またはオブジェクトであることを想定して合計を計算
                        let currentBuyInTotal = 0;
                        if (room.buyIns) {
                            if (Array.isArray(room.buyIns)) {
                                currentBuyInTotal = room.buyIns.reduce((sum, val) => sum + (Number(val) || 0), 0);
                            } else if (typeof room.buyIns === 'object') {
                                currentBuyInTotal = Object.values(room.buyIns).reduce((sum, val) => sum + (Number(val) || 0), 0);
                            } else {
                                currentBuyInTotal = Number(room.buyIns) || 0;
                            }
                        }

                        const currentFinalChips = Number(room.finalChips) || 0;

                        // 名前単位で集計
                        if (!playerStats[name]) {
                            playerStats[name] = { name: name, totalBuyIns: 0, totalFinalChips: 0 };
                        }
                        playerStats[name].totalBuyIns += currentBuyInTotal;
                        playerStats[name].totalFinalChips += currentFinalChips;
                    });

                    // 収支計算とランキング用配列への変換
                    const rankingArray = Object.values(playerStats).map(player => {
                        return {
                            name: player.name,
                            totalBuyIns: player.totalBuyIns,
                            totalFinalChips: player.totalFinalChips,
                            profit: player.totalFinalChips - player.totalBuyIns // 収支計算
                        };
                    });

                    // 収支が高い順（勝っている順）にソート
                    rankingArray.sort((a, b) => b.profit - a.profit);

                    // HTML描画
                    const tbody = document.getElementById('rankingBody');
                    tbody.innerHTML = '';

                    rankingArray.forEach((player, index) => {
                        const tr = document.createElement('tr');
                        if (index === 0) tr.className = 'rank-1';

                        const profitClass = player.profit > 0 ? 'plus' : (player.profit < 0 ? 'minus' : '');
                        const profitPrefix = player.profit > 0 ? '+' : '';

                        tr.innerHTML = `
                            <td class="rank-num">${index + 1}</td>
                            <td>${player.name}</td>
                            <td>${player.totalBuyIns.toLocaleString()}</td>
                            <td>${player.totalFinalChips.toLocaleString()}</td>
                            <td class="${profitClass}">${profitPrefix}${player.profit.toLocaleString()}</td>
                        `;
                        tbody.appendChild(tr);
                    });

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('rankingTable').style.display = 'table';
                } else {
                    document.getElementById('loading').innerText = "データがありません。";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = "エラーが発生しました。";
            }
        }

        fetchRanking();
    </script>
</body>
</html>
