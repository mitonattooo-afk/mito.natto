<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>収支ランキング</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f7f6; }
        h1 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .rank-1 { font-weight: bold; color: #d4af37; } /* 金 */
        .rank-2 { font-weight: bold; color: #aaa9ad; } /* 銀 */
        .rank-3 { font-weight: bold; color: #b08d57; } /* 銅 */
        .loading { text-align: center; font-size: 1.2em; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>収支ランキング</h1>
    <div id="loading" class="loading">データを読み込み中...</div>
    <table id="rankingTable" style="display:none;">
        <thead>
            <tr>
                <th>順位</th>
                <th>名前</th>
                <th>buyIns合計</th>
                <th>finalChips合計</th>
                <th>収支 (差分)</th>
            </tr>
        </thead>
        <tbody id="rankingBody">
            <!-- ここにデータが挿入されます -->
        </tbody>
    </table>

    <!-- Firebase SDK の読み込み -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase設定
        const firebaseConfig = {
            projectId: "mito-natto-168bd",
            apiKey: "ここにAPIキーを入れてください", 
            authDomain: "mito-natto-168bd.firebaseapp.com",
            databaseURL: "https://mito-natto-168bd-default-rtdb.firebaseio.com",
            storageBucket: "mito-natto-168bd.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        // Firebase初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function fetchAndRenderRanking() {
            try {
                // 'records' というパスにデータがある想定です。適宜変更してください。
                const dbRef = ref(db, 'pokerRooms'); 
                const snapshot = await get(dbRef);

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const aggregation = {};

                    // 1. 名前単位で集計
                    Object.values(data).forEach(entry => {
                        const name = entry.name;
                        const buyIn = Number(entry.buyIns) || 0;
                        const finalChip = Number(entry.finalChips) || 0;

                        if (!aggregation[name]) {
                            aggregation[name] = { name: name, totalBuyIns: 0, totalFinalChips: 0 };
                        }
                        aggregation[name].totalBuyIns += buyIn;
                        aggregation[name].totalFinalChips += finalChip;
                    });

                    // 2. 配列に変換し、計算(buyIns - finalChips)
                    const rankingArray = Object.values(aggregation).map(item => {
                        return {
                            ...item,

                            balance: item.totalFinalChips - item.totalBuyIns
                        };
                    });

                    // 3. 収支が高い順にソート
                    rankingArray.sort((a, b) => b.balance - a.balance);

                    // 4. HTMLに描画
                    const tbody = document.getElementById('rankingBody');
                    tbody.innerHTML = '';

                    rankingArray.forEach((item, index) => {
                        const tr = document.createElement('tr');
                        const rank = index + 1;
                        let rankClass = '';
                        if(rank === 1) rankClass = 'rank-1';
                        if(rank === 2) rankClass = 'rank-2';
                        if(rank === 3) rankClass = 'rank-3';

                        tr.innerHTML = `
                            <td class="${rankClass}">${rank}位</td>
                            <td>${item.name}</td>
                            <td>${item.totalBuyIns.toLocaleString()}</td>
                            <td>${item.totalFinalChips.toLocaleString()}</td>
                            <td><strong>${item.balance.toLocaleString()}</strong></td>
                        `;
                        tbody.appendChild(tr);
                    });

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('rankingTable').style.display = 'table';
                } else {
                    document.getElementById('loading').innerText = "データが見つかりませんでした。";
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading').innerText = "エラーが発生しました。コンソールを確認してください。";
            }
        }

        fetchAndRenderRanking();
    </script>
</body>
</html>
