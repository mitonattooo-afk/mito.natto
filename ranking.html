<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>収支ランキング</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background: #2c3e50; color: white; }
        .plus { color: #28a745; font-weight: bold; }
        .minus { color: #dc3545; font-weight: bold; }
        .rank-1 { background-color: #fff9c4; font-weight: bold; }
        .loading { text-align: center; margin-top: 50px; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h1>総収支ランキング</h1>
    <div id="loading" class="loading">Firestoreからデータを取得中...</div>
    
    <table id="rankingTable" style="display:none;">
        <thead>
            <tr>
                <th>順位</th>
                <th>名前</th>
                <th>総購入チップ</th>
                <th>最終チップ</th>
                <th>トータル収支 (×1000)</th>
            </tr>
        </thead>
        <tbody id="rankingBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        projectId: "mito-natto-168bd",
        apiKey: "YOUR_API_KEY", // ここに実際のAPIキーをいれてください
        authDomain: "mito-natto-168bd.firebaseapp.com",
        databaseURL: "https://mito-natto-168bd-default-rtdb.firebaseio.com",
        storageBucket: "mito-natto-168bd.appspot.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadRanking() {
        try {
            const playerStats = {};
            const querySnapshot = await getDocs(collection(db, "pokerRooms"));
            
            if (querySnapshot.empty) {
                document.getElementById('loading').innerText = "データがありません。";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const players = data.players || [];

                players.forEach(player => {
                    const name = player.name;
                    if (!name) return;

                    const buyInTotal = Array.isArray(player.buyIns)
                        ? player.buyIns.reduce((sum, v) => sum + (Number(v) || 0), 0)
                        : (Number(player.buyIns) || 0);
                    
                    const finalChips = Number(player.finalChips) || 0;

                    if (!playerStats[name]) {
                        playerStats[name] = { name: name, totalBuyIns: 0, totalFinalChips: 0 };
                    }
                    playerStats[name].totalBuyIns += buyInTotal;
                    playerStats[name].totalFinalChips += finalChips;
                });
            });

            // ランキング用配列に変換（ここで1000倍する）
            const rankingArray = Object.values(playerStats).map(p => {
                const chipDiff = p.totalFinalChips - p.totalBuyIns;
                return {
                    ...p,
                    profit: chipDiff * 1000 // ★ここで1000倍
                };
            });

            // 収支の降順（勝っている順）でソート
            rankingArray.sort((a, b) => b.profit - a.profit);

            const tbody = document.getElementById('rankingBody');
            tbody.innerHTML = '';

            rankingArray.forEach((player, index) => {
                const tr = document.createElement('tr');
                if (index === 0) tr.classList.add('rank-1');

                const profitClass = player.profit > 0 ? 'plus' : (player.profit < 0 ? 'minus' : '');
                const profitSign = player.profit > 0 ? '+' : '';

                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${player.name}</td>
                    <td>${player.totalBuyIns.toLocaleString()}</td>
                    <td>${player.totalFinalChips.toLocaleString()}</td>
                    <td class="${profitClass}">${profitSign}${player.profit.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('rankingTable').style.display = 'table';

        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerText = "エラー: " + error.message;
        }
    }

    loadRanking();
</script>
</body>
</html>
